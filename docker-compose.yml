version: '3.8'

services:
  flow2api:
    image: ghcr.io/thesmallhancat/flow2api:latest
    container_name: flow2api
    ports:
      - "38000:8800"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
